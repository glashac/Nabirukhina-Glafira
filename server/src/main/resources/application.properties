# Database (MySQL)
# Для запуска с MySQL укажите реальные параметры подключения,
# например: jdbc:mysql://localhost:3306/car_rental?useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/car_rental?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Spring Security (встроенный пользователь)
spring.security.user.name=admin
spring.security.user.password=admin

# Email (JavaMailSender) - замените на реальные значения
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# H2 console (можно временно использовать для разработки)
# spring.h2.console.enabled=true
